<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      margin: 0;
      background: #f8fafc;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: center;
    }
    .logo {
      font-weight: 800;
      font-size: 20px;
      color: #6c5ce7;
      margin-bottom: 5px;
    }
    .btn {
      background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .btn:hover {
      transform: scale(1.02);
    }
    .status {
      font-size: 12px;
      color: #64748b;
    }
    .icon {
      font-size: 40px;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">CV Edi Pro</div>
    <div class="icon">🎯</div>
    <p class="status">Navegue até uma vaga e clique abaixo para capturar.</p>
    <button id="captureBtn" class="btn">CAPTURAR VAGA AGORA</button>
    <div id="resultMsg" style="margin-top: 10px; font-size: 12px;"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
