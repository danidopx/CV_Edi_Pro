name: Supabase + Versionamento

on:
  push:
    branches:
      - main
      - codex/**
      - preview/**
  pull_request:

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install

      - name: Validar projeto
        run: npm run ci:validate

  sincronizar_supabase:
    if: github.event_name == 'push'
    needs: validar
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Verificar segredos Supabase
        id: supabase_secrets
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [[ -n "$SUPABASE_ACCESS_TOKEN" && -n "$SUPABASE_DB_PASSWORD" && -n "$SUPABASE_PROJECT_ID" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Segredos Supabase ausentes; pulando db push."
          fi

      - name: Instalar Supabase CLI
        if: steps.supabase_secrets.outputs.enabled == 'true'
        uses: supabase/setup-cli@v1

      - name: Aplicar migrations no Supabase
        if: steps.supabase_secrets.outputs.enabled == 'true'
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push

  registrar_versao:
    if: github.event_name == 'push'
    needs: sincronizar_supabase
    runs-on: ubuntu-latest

    steps:
      - name: Definir ambiente e versão
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=preview" >> "$GITHUB_OUTPUT"
          fi

          VERSION="$(date +'%Y.%m.%d').${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Registrar versão no Supabase
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
        run: |
          if [[ -z "$SUPABASE_URL" || -z "$SUPABASE_SERVICE_ROLE_KEY" ]]; then
            echo "SUPABASE_URL ou SUPABASE_SERVICE_ROLE_KEY ausente."
            exit 1
          fi

          curl -sS -X POST "$SUPABASE_URL/rest/v1/rpc/register_app_version" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"p_environment_name\": \"${{ steps.version.outputs.environment }}\",
              \"p_current_version\": \"${{ steps.version.outputs.version }}\",
              \"p_commit_ref\": \"$GITHUB_SHA\",
              \"p_branch_name\": \"$GITHUB_REF_NAME\",
              \"p_deployment_url\": \"$VERCEL_URL\",
              \"p_release_notes\": \"Deploy automático via GitHub Actions\",
              \"p_source\": \"github_actions\"
            }"
