name: Deploy & Versionamento CV Edi Pro

on:
  push:
    branches:
      - '**'

jobs:
  versionar_e_deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detectar contexto da branch
        id: context
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          if [[ "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "master" ]]; then
            echo "is_release_branch=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_branch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Automatizar versão oficial
        if: steps.context.outputs.is_release_branch == 'true'
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: false
          DEFAULT_BUMP: patch

      - name: Calcular versão do preview
        if: steps.context.outputs.is_release_branch == 'false'
        id: preview_version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag --sort=-version:refname | head -n 1)
          if [[ -z "$LATEST_TAG" ]]; then
            LATEST_TAG="0.0.0"
          fi

          IFS='.' read -r BASE_MAJOR BASE_MINOR BASE_PATCH <<< "$BASE_VERSION"
          IFS='.' read -r TAG_MAJOR TAG_MINOR TAG_PATCH <<< "$LATEST_TAG"

          BASE_MAJOR=${BASE_MAJOR:-0}
          BASE_MINOR=${BASE_MINOR:-0}
          BASE_PATCH=${BASE_PATCH:-0}
          TAG_MAJOR=${TAG_MAJOR:-0}
          TAG_MINOR=${TAG_MINOR:-0}
          TAG_PATCH=${TAG_PATCH:-0}

          PREVIEW_MAJOR=$BASE_MAJOR
          PREVIEW_MINOR=$BASE_MINOR
          PREVIEW_PATCH=$BASE_PATCH

          if (( TAG_MAJOR > PREVIEW_MAJOR || (TAG_MAJOR == PREVIEW_MAJOR && TAG_MINOR > PREVIEW_MINOR) || (TAG_MAJOR == PREVIEW_MAJOR && TAG_MINOR == PREVIEW_MINOR && TAG_PATCH > PREVIEW_PATCH) )); then
            PREVIEW_MAJOR=$TAG_MAJOR
            PREVIEW_MINOR=$TAG_MINOR
            PREVIEW_PATCH=$TAG_PATCH
          fi

          PREVIEW_PATCH=$((PREVIEW_PATCH + 1))
          echo "value=$PREVIEW_MAJOR.$PREVIEW_MINOR.$PREVIEW_PATCH" >> "$GITHUB_OUTPUT"

      - name: Atualizar arquivos para release
        if: steps.context.outputs.is_release_branch == 'true'
        shell: bash
        run: |
          NEW_VER=${{ steps.tag_version.outputs.new_tag }}
          CACHE_ID=$(date +%s | tail -c 6)

          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VER\"/" package.json
          sed -i "s|CV Edi Pro v[0-9.]*\( - Preview\)\{0,1\}|CV Edi Pro v$NEW_VER|g" public/index.html
          sed -i "s|manifest\.json?v=[0-9.]*|manifest.json?v=$CACHE_ID|g" public/index.html
          sed -i "s|sw\.js?v=[0-9.]*|sw.js?v=$CACHE_ID|g" public/index.html
          sed -i "s|const CACHE_NAME = '[^']*';|const CACHE_NAME = 'cv-edi-pro-v$CACHE_ID';|" public/sw.js

      - name: Atualizar arquivos para preview
        if: steps.context.outputs.is_release_branch == 'false'
        shell: bash
        run: |
          PREVIEW_VER=${{ steps.preview_version.outputs.value }}
          CACHE_ID=$(date +%s | tail -c 6)

          sed -i "s/\"version\": \".*\"/\"version\": \"$PREVIEW_VER\"/" package.json
          sed -i "s|CV Edi Pro v[0-9.]*\( - Preview\)\{0,1\}|CV Edi Pro v$PREVIEW_VER - Preview|g" public/index.html
          sed -i "s|manifest\.json?v=[0-9.]*|manifest.json?v=$CACHE_ID|g" public/index.html
          sed -i "s|sw\.js?v=[0-9.]*|sw.js?v=$CACHE_ID|g" public/index.html
          sed -i "s|const CACHE_NAME = '[^']*';|const CACHE_NAME = 'cv-edi-pro-v$CACHE_ID-preview';|" public/sw.js

      - name: Commitar e enviar alterações automáticas
        shell: bash
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json public/index.html public/sw.js

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          if [[ "${{ steps.context.outputs.is_release_branch }}" == "true" ]]; then
            TARGET_VER=${{ steps.tag_version.outputs.new_tag }}
            git commit -m "chore: v$TARGET_VER [skip ci]"
          else
            TARGET_VER=${{ steps.preview_version.outputs.value }}
            git commit -m "chore: preview v$TARGET_VER [skip ci]"
          fi

          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Deploy SQL para o banco
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
