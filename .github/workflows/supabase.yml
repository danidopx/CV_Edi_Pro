name: Deploy & Versionamento CV Edi Pro

on:
  push:
    branches:
      - '**'

jobs:
  versionar_e_deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detectar contexto da branch
        id: context
        shell: bash
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          if [[ "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "master" ]]; then
            echo "is_release_branch=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_branch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Automatizar versão oficial
        if: steps.context.outputs.is_release_branch == 'true'
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: false
          DEFAULT_BUMP: patch

      - name: Calcular versão do preview
        if: steps.context.outputs.is_release_branch == 'false'
        id: preview_version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git tag --sort=-version:refname | head -n 1)
          if [[ -z "$LATEST_TAG" ]]; then
            LATEST_TAG="0.0.0"
          fi

          IFS='.' read -r BASE_MAJOR BASE_MINOR BASE_PATCH <<< "$BASE_VERSION"
          IFS='.' read -r TAG_MAJOR TAG_MINOR TAG_PATCH <<< "$LATEST_TAG"

          BASE_MAJOR=${BASE_MAJOR:-0}
          BASE_MINOR=${BASE_MINOR:-0}
          BASE_PATCH=${BASE_PATCH:-0}
          TAG_MAJOR=${TAG_MAJOR:-0}
          TAG_MINOR=${TAG_MINOR:-0}
          TAG_PATCH=${TAG_PATCH:-0}

          PREVIEW_MAJOR=$BASE_MAJOR
          PREVIEW_MINOR=$BASE_MINOR
          PREVIEW_PATCH=$BASE_PATCH

          if (( TAG_MAJOR > PREVIEW_MAJOR || (TAG_MAJOR == PREVIEW_MAJOR && TAG_MINOR > PREVIEW_MINOR) || (TAG_MAJOR == PREVIEW_MAJOR && TAG_MINOR == PREVIEW_MINOR && TAG_PATCH > PREVIEW_PATCH) )); then
            PREVIEW_MAJOR=$TAG_MAJOR
            PREVIEW_MINOR=$TAG_MINOR
            PREVIEW_PATCH=$TAG_PATCH
          fi

          PREVIEW_PATCH=$((PREVIEW_PATCH + 1))
          echo "value=$PREVIEW_MAJOR.$PREVIEW_MINOR.$PREVIEW_PATCH" >> "$GITHUB_OUTPUT"

      - name: Atualizar arquivos para release
        if: steps.context.outputs.is_release_branch == 'true'
        shell: bash
        run: |
          NEW_VER=${{ steps.tag_version.outputs.new_tag }}
          CACHE_ID=$(date +%s | tail -c 6)

          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VER\"/" package.json
          sed -i "s|CV Edi Pro v[0-9.]*\( - Preview\)\{0,1\}|CV Edi Pro v$NEW_VER|g" public/index.html
          sed -i "s|manifest\.json?v=[0-9.]*|manifest.json?v=$CACHE_ID|g" public/index.html
          sed -i "s|sw\.js?v=[0-9.]*|sw.js?v=$CACHE_ID|g" public/index.html
          sed -i "s|const CACHE_NAME = '[^']*';|const CACHE_NAME = 'cv-edi-pro-v$CACHE_ID';|" public/sw.js

      - name: Atualizar arquivos para preview
        if: steps.context.outputs.is_release_branch == 'false'
        shell: bash
        run: |
          PREVIEW_VER=${{ steps.preview_version.outputs.value }}
          CACHE_ID=$(date +%s | tail -c 6)

          sed -i "s/\"version\": \".*\"/\"version\": \"$PREVIEW_VER\"/" package.json
          sed -i "s|CV Edi Pro v[0-9.]*\( - Preview\)\{0,1\}|CV Edi Pro v$PREVIEW_VER - Preview|g" public/index.html
          sed -i "s|manifest\.json?v=[0-9.]*|manifest.json?v=$CACHE_ID|g" public/index.html
          sed -i "s|sw\.js?v=[0-9.]*|sw.js?v=$CACHE_ID|g" public/index.html
          sed -i "s|const CACHE_NAME = '[^']*';|const CACHE_NAME = 'cv-edi-pro-v$CACHE_ID-preview';|" public/sw.js

      - name: Commitar e enviar alterações automáticas
        shell: bash
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json public/index.html public/sw.js

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          if [[ "${{ steps.context.outputs.is_release_branch }}" == "true" ]]; then
            TARGET_VER=${{ steps.tag_version.outputs.new_tag }}
            git commit -m "chore: v$TARGET_VER [skip ci]"
          else
            TARGET_VER=${{ steps.preview_version.outputs.value }}
            git commit -m "chore: preview v$TARGET_VER [skip ci]"
          fi

          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Definir metadados de versionamento
        id: version_meta
        shell: bash
        run: |
          if [[ "${{ steps.context.outputs.is_release_branch }}" == "true" ]]; then
            echo "environment_name=production" >> "$GITHUB_OUTPUT"
            echo "target_version=${{ steps.tag_version.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
            echo "deployment_url=https://cvedipro.vercel.app" >> "$GITHUB_OUTPUT"
            echo "release_notes=Registro automático de versão de produção pelo GitHub Actions." >> "$GITHUB_OUTPUT"
          else
            echo "environment_name=preview" >> "$GITHUB_OUTPUT"
            echo "target_version=${{ steps.preview_version.outputs.value }}" >> "$GITHUB_OUTPUT"
            echo "deployment_url=https://cvedipro-preview.vercel.app" >> "$GITHUB_OUTPUT"
            echo "release_notes=Registro automático de versão de preview pelo GitHub Actions." >> "$GITHUB_OUTPUT"
          fi

          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Deploy SQL para o banco
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Registrar versão no banco
        shell: bash
        run: |
          export PGPASSWORD="$SUPABASE_DB_PASSWORD"
          psql "host=db.$SUPABASE_PROJECT_ID.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" <<SQL
          WITH previous_current AS (
              SELECT id, current_version
              FROM public.app_versions
              WHERE environment_name = '${{ steps.version_meta.outputs.environment_name }}'
                AND is_current = true
              ORDER BY release_date DESC
              LIMIT 1
          ),
          clear_current AS (
              UPDATE public.app_versions
              SET is_current = false
              WHERE id IN (SELECT id FROM previous_current)
          )
          INSERT INTO public.app_versions (
              app_name,
              environment_name,
              current_version,
              previous_version,
              release_date,
              responsible_name,
              responsible_email,
              deployment_url,
              commit_ref,
              release_notes,
              source,
              is_current,
              is_public,
              created_by
          )
          VALUES (
              'CV Edi Pro',
              '${{ steps.version_meta.outputs.environment_name }}',
              '${{ steps.version_meta.outputs.target_version }}',
              COALESCE((SELECT current_version FROM previous_current), NULL),
              NOW(),
              'GitHub Action',
              'action@github.com',
              '${{ steps.version_meta.outputs.deployment_url }}',
              '${{ steps.version_meta.outputs.commit_sha }}',
              '${{ steps.version_meta.outputs.release_notes }}',
              'github_actions',
              true,
              true,
              NULL
          );
          SQL
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
