name: Versionar CV Edi Pro

on:
  push:
    branches:
      - main
      - codex/**
      - preview/**

jobs:
  register-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Definir ambiente e versão
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=preview" >> $GITHUB_OUTPUT
          fi

          VERSION="$(date +'%Y.%m.%d').${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Registrar versão no Supabase
        run: |
          curl -X POST "${SUPABASE_URL}/rest/v1/rpc/register_app_version" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"p_environment_name\": \"${{ steps.version.outputs.environment }}\",
              \"p_current_version\": \"${{ steps.version.outputs.version }}\",
              \"p_commit_ref\": \"${GITHUB_SHA}\",
              \"p_branch_name\": \"${GITHUB_REF_NAME}\",
              \"p_deployment_url\": \"${VERCEL_URL}\",
              \"p_release_notes\": \"Deploy automático via GitHub Actions\",
              \"p_source\": \"github_actions\"
            }"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
