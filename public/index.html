<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>CV Edi Pro - Currículos com Inteligência Artificial</title>

    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">

    <link rel="manifest" href="manifest.json?v=17308">
    <meta name="theme-color" content="#6c5ce7">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js?v=17308'); }</script>

    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS ESPECÍFICO PARA AS NOVAS ABAS DO ADMIN - NÃO MEXE NO RESTO */
        .tabs-header {
            display: flex;
            background: #2a2a3c;
            border-bottom: 1px solid #444;
            margin-bottom: 15px;
            border-radius: 8px 8px 0 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: #ccc;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #6c5ce7;
            border-bottom: 3px solid #6c5ce7;
            background: rgba(108, 92, 231, 0.1);
        }

        .tab-content {
            display: none;
            padding: 10px 0;
        }

        .tab-content.active {
            display: block !important;
        }

        .model-item-badge {
            background: #2d2d44;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 5px;
            border-left: 3px solid #6c5ce7;
            font-size: 0.85rem;
            font-family: monospace;
        }

        #modal-admin .modal-content {
            background: #1e1e2e;
            color: #fff;
            border: 1px solid #444;
            max-width: 600px;
            width: 95%;
        }
    </style>
</head>

<body>
    <div id="tela-landing" class="tela ativa">
        <div class="hero-section">
            <h1>CV Edi <span class="badge-pro">PRO</span></h1>
            <p>O seu currículo adaptado para qualquer vaga em segundos usando IA.</p>
            <div class="hero-btns">
                <button class="btn-base btn-primary" onclick="irPara('tela-login')">Entrar ou Cadastrar</button>
            </div>
        </div>
    </div>

    <div id="tela-login" class="tela">
        <div class="login-container">
            <h2 id="login-title">Entrar no CV Edi</h2>
            <div id="msg-login" style="display:none; color: var(--primary); margin-bottom: 10px;">Processando...</div>
            <button class="btn-base btn-google" onclick="fazerLoginGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Entrar com
                Google
            </button>
            <div class="separator"><span>ou use seu e-mail</span></div>
            <input type="email" id="login-email" class="input-base" placeholder="Seu e-mail">
            <input type="password" id="login-senha" class="input-base" placeholder="Sua senha">
            <button class="btn-base btn-primary" onclick="processarFormularioLogin()">Entrar</button>
            <p class="toggle-login">Novo aqui? <a href="#" onclick="alternarModoLogin(true)">Criar conta</a></p>
        </div>
    </div>

    <div id="tela-editor" class="tela">
        <header class="main-header">
            <div class="logo">CV Edi <span class="badge-pro">PRO</span></div>
            <div class="user-menu">
                <span id="user-name-display">Usuário</span>
                <button id="btn-admin-config" class="btn-icon" style="display:none;"
                    onclick="abrirConfigAdmin()">⚙️</button>
                <button class="btn-icon" onclick="fazerLogout()">🚪</button>
            </div>
        </header>

        <main class="editor-layout">
            <div class="sidebar-paineis">
                <details open>
                    <summary>✨ Importação Mágica</summary>
                    <div style="padding:15px;">
                        <textarea id="texto-extracao" class="input-base" rows="5"
                            placeholder="Cole seu LinkedIn..."></textarea>
                        <button class="btn-base btn-primary" onclick="fluxoNovo()">Extrair com IA</button>
                    </div>
                </details>
            </div>

            <div class="preview-cv">
                <div id="curriculo-wrapper">
                    <div id="curriculo">
                        <h2 id="nomePreview">NOME COMPLETO</h2>
                        <div id="contatoPreview">...</div>
                        <div id="preRes"></div>
                        <div id="preExp"></div>
                    </div>
                </div>
                <button class="btn-base btn-primary" onclick="gerarPDF()">Baixar PDF</button>
            </div>
        </main>
    </div>

    <div id="modal-admin" class="modal-overlay" style="display:none; z-index: 9999;">
        <div class="modal-content admin-panel">
            <div class="modal-header">
                <h2>⚙️ Configurações da IA</h2>
                <button class="btn-fechar" onclick="this.closest('.modal-overlay').style.display='none'">×</button>
            </div>

            <div class="tabs-header">
                <button class="tab-btn active" onclick="alternarAbasAdmin('tab-modelos')">🤖 Modelos</button>
                <button class="tab-btn" onclick="alternarAbasAdmin('tab-prompts-geracao')">📄 Geração</button>
                <button class="tab-btn" onclick="alternarAbasAdmin('tab-prompts-ats')">🎯 ATS/Valid</button>
            </div>

            <div class="tabs-body" style="max-height: 60vh; overflow-y: auto; padding: 0 15px;">
                <div id="tab-modelos" class="tab-content active">
                    <p><small>Sincronizado em:</small> <strong id="sync-data-hora">--</strong></p>
                    <div id="historico-modelos-ia"></div>
                </div>

                <div id="tab-prompts-geracao" class="tab-content">
                    <label style="color:#6c5ce7; font-size:12px; font-weight:bold;">Prompt Adaptação Simples:</label>
                    <textarea id="cfg-prompt-simples" class="input-base" rows="4"></textarea>

                    <label
                        style="color:#6c5ce7; font-size:12px; font-weight:bold; margin-top:10px; display:block;">Prompt
                        Adaptação Agressiva:</label>
                    <textarea id="cfg-prompt-agressivo" class="input-base" rows="4"></textarea>
                </div>

                <div id="tab-prompts-ats" class="tab-content">
                    <label style="color:#6c5ce7; font-size:12px; font-weight:bold;">Motor de Score ATS:</label>
                    <textarea id="cfg-prompt-ats" class="input-base" rows="5"></textarea>

                    <label
                        style="color:#6c5ce7; font-size:12px; font-weight:bold; margin-top:10px; display:block;">Validação
                        de Vaga:</label>
                    <textarea id="cfg-prompt-validacao" class="input-base" rows="3"></textarea>
                </div>
            </div>

            <div class="modal-footer" style="padding: 15px;">
                <button class="btn-base btn-primary" style="width: 100%;" onclick="salvarConfigAdmin()">Salvar Todas as
                    Configurações</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
