<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>CV Edi Pro - Currículos com Inteligência Artificial</title>

    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">

    <link rel="manifest" href="manifest.json?v=16887">
    <meta name="theme-color" content="#6c5ce7">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js?v=16887'); }</script>

    <link rel="stylesheet" href="style.css">
    <style>
        /* CORREÇÃO DAS ABAS DO PAINEL ADMIN */
        .tabs-header {
            display: flex;
            background: #2a2a3c;
            border-bottom: 1px solid #444;
            margin-bottom: 15px;
            border-radius: 8px 8px 0 0;
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: #ccc;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #6c5ce7;
            border-bottom: 3px solid #6c5ce7;
            background: rgba(108, 92, 231, 0.1);
        }

        .tab-content {
            display: none;
            /* Esconde por padrão */
            padding: 10px 0;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block !important;
            /* Mostra apenas a ativa */
        }

        #modal-admin .modal-content {
            background: #1e1e2e;
            color: #fff;
            border: 1px solid #444;
            max-width: 600px;
            width: 95%;
            z-index: 10001;
        }

        .tabs-body label {
            display: block;
            margin: 12px 0 5px;
            color: #6c5ce7;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .model-item-badge {
            background: #2d2d44;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 5px;
            border-left: 3px solid #6c5ce7;
            font-size: 0.85rem;
            font-family: monospace;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div id="modal-admin" class="modal-overlay" style="display:none; z-index: 9999;">
        <div class="modal-content admin-panel">
            <div class="modal-header">
                <h2>⚙️ Configurações de IA</h2>
                <button class="btn-fechar" onclick="this.closest('.modal-overlay').style.display='none'">×</button>
            </div>

            <div class="tabs-header">
                <button class="tab-btn active" onclick="alternarAbasAdmin('tab-modelos')">🤖 Modelos</button>
                <button class="tab-btn" onclick="alternarAbasAdmin('tab-prompts-geracao')">📄 Geração</button>
                <button class="tab-btn" onclick="alternarAbasAdmin('tab-prompts-ats')">🎯 ATS/Valid</button>
            </div>

            <div class="tabs-body" style="max-height: 60vh; overflow-y: auto; padding: 0 15px;">

                <div id="tab-modelos" class="tab-content active">
                    <div
                        style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                        <small style="color: #aaa;">Última Sincronização:</small><br>
                        <strong id="sync-data-hora">--/--/---- --:--</strong>
                    </div>
                    <div id="historico-modelos-ia">
                    </div>
                </div>

                <div id="tab-prompts-geracao" class="tab-content">
                    <label>Adaptação Simples (Tom direto):</label>
                    <textarea id="cfg-prompt-simples" class="input-base" rows="4"></textarea>

                    <label>Adaptação Agressiva (Foco ATS):</label>
                    <textarea id="cfg-prompt-agressivo" class="input-base" rows="4"></textarea>
                </div>

                <div id="tab-prompts-ats" class="tab-content">
                    <label>Motor de Score ATS:</label>
                    <textarea id="cfg-prompt-ats" class="input-base" rows="5"></textarea>

                    <label>Validação de Link/Vaga:</label>
                    <textarea id="cfg-prompt-validacao" class="input-base" rows="3"></textarea>
                </div>

            </div>

            <div class="modal-footer" style="padding: 15px; border-top: 1px solid #444; margin-top: 10px;">
                <button class="btn-base btn-primary" style="width: 100%;" onclick="salvarConfigAdmin()">
                    💾 Salvar Configurações
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
